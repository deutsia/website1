<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S/HE IS STILL HER/E</title>
    <link rel="icon" type="image/webp" href="../assets/favi.webp">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background: #030305;
            color: rgba(255, 255, 255, 0.7);
        }

        /* THE WORLD - everything that zooms */
        .world {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scale(1);
            transform-origin: 50% 65%;
            transition: transform 2.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.storm .world {
            transform: scale(2.2);
        }

        .sky {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg,
                #0d0d18 0%,
                #151525 25%,
                #1a1a2e 40%,
                #2d3a4a 55%,
                #4a5568 65%,
                #718096 75%,
                #a0aec0 100%
            );
            transition: background 2.5s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 0;
        }

        body.storm .sky {
            background: linear-gradient(180deg,
                #0a0000 0%,
                #1a0505 25%,
                #2d0a0a 40%,
                #3d0f0f 55%,
                #4a1515 65%,
                #5c1a1a 75%,
                #6b1f1f 100%
            );
        }

        /* HORIZON AND WATER */
        .horizon {
            position: fixed;
            top: 65%;
            left: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(180deg,
                #3d4a5c 0%,
                #2d3a4a 20%,
                #1a2530 50%,
                #0f1520 100%
            );
            z-index: 2;
            transition: background 2.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.storm .horizon {
            background: linear-gradient(180deg,
                #3d1515 0%,
                #2d0f0f 20%,
                #1a0808 50%,
                #0a0303 100%
            );
        }

        /* Water surface reflection */
        .water-surface {
            position: fixed;
            top: 65%;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.1) 30%,
                rgba(255, 255, 255, 0.2) 50%,
                rgba(255, 255, 255, 0.1) 70%,
                transparent 100%
            );
            z-index: 3;
            transition: background 2.5s ease;
        }

        body.storm .water-surface {
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(198, 24, 26, 0.3) 30%,
                rgba(198, 24, 26, 0.5) 50%,
                rgba(198, 24, 26, 0.3) 70%,
                transparent 100%
            );
        }

        /* Water ripples canvas */
        .water-canvas {
            position: fixed;
            top: 65%;
            left: 0;
            width: 100%;
            height: 35%;
            pointer-events: none;
            z-index: 3;
            opacity: 0.3;
        }

        .clouds-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.7;
            transition: opacity 2.5s ease, filter 2.5s ease;
        }

        body.storm .clouds-canvas {
            opacity: 0.5;
            filter: hue-rotate(-30deg) saturate(3) brightness(0.4);
        }

        .red-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse 150% 100% at 50% 60%,
                rgba(139, 0, 0, 0.6) 0%,
                rgba(100, 0, 0, 0.4) 30%,
                rgba(60, 0, 0, 0.2) 60%,
                transparent 80%
            );
            opacity: 0;
            pointer-events: none;
            z-index: 4;
            transition: opacity 2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.storm .red-glow {
            opacity: 1;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
            pointer-events: none;
            z-index: 5;
            transition: background 2.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.storm .vignette {
            background: radial-gradient(ellipse at 50% 60%, transparent 5%, rgba(0,0,0,0.95) 60%);
        }

        /* FIGURES - The two silhouettes */
        .figures-container {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 200px;
            z-index: 6;
            pointer-events: none;
        }

        .figure {
            position: absolute;
            bottom: 0;
            width: 40px;
            transition: all 2.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .figure-left {
            left: 60px;
            transform: scaleX(1);
        }

        .figure-right {
            right: 60px;
            transform: scaleX(-1);
        }

        body.storm .figure-left {
            left: 155px;
        }

        body.storm .figure-right {
            right: 155px;
        }

        /* Figure body parts */
        .figure-head {
            width: 20px;
            height: 20px;
            background: #0a0a0f;
            border-radius: 50%;
            margin: 0 auto 2px;
            transition: background 2.5s ease;
        }

        body.storm .figure-head {
            background: #1a0505;
        }

        .figure-body {
            width: 30px;
            height: 50px;
            background: #0a0a0f;
            margin: 0 auto;
            border-radius: 15px 15px 0 0;
            transition: background 2.5s ease;
        }

        body.storm .figure-body {
            background: #1a0505;
        }

        /* Dress for female figure */
        .figure-left .figure-body {
            width: 35px;
            height: 45px;
            border-radius: 12px 12px 20px 20px;
            position: relative;
        }

        .figure-left .figure-body::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 25px;
            background: #0a0a0f;
            border-radius: 0 0 25px 25px;
            transition: background 2.5s ease;
        }

        body.storm .figure-left .figure-body::after {
            background: #1a0505;
        }

        .figure-legs {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-top: -2px;
        }

        .figure-leg {
            width: 8px;
            height: 35px;
            background: #0a0a0f;
            border-radius: 0 0 4px 4px;
            transition: background 2.5s ease;
        }

        body.storm .figure-leg {
            background: #1a0505;
        }

        .figure-left .figure-legs {
            margin-top: 12px;
        }

        /* Diving boards / platforms */
        .platform {
            position: absolute;
            bottom: -5px;
            width: 80px;
            height: 8px;
            background: linear-gradient(180deg, #2a2a35 0%, #15151a 100%);
            border-radius: 2px;
            transition: all 2.5s cubic-bezier(0.23, 1, 0.32, 1), background 2.5s ease;
        }

        .platform-left {
            left: 30px;
        }

        .platform-right {
            right: 30px;
        }

        body.storm .platform {
            background: linear-gradient(180deg, #2a1515 0%, #150808 100%);
            opacity: 0;
        }

        body.storm .platform-left {
            left: 140px;
        }

        body.storm .platform-right {
            right: 140px;
        }

        /* Ground/pool area */
        .ground {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(180deg,
                #0f1218 0%,
                #0a0d12 50%,
                #050608 100%
            );
            z-index: 5;
            transition: background 2.5s ease;
        }

        body.storm .ground {
            background: linear-gradient(180deg,
                #1a0808 0%,
                #0f0404 50%,
                #050202 100%
            );
        }

        /* Pool edge detail */
        .pool-edge {
            position: fixed;
            bottom: 28%;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.05) 20%,
                rgba(255, 255, 255, 0.1) 50%,
                rgba(255, 255, 255, 0.05) 80%,
                transparent 100%
            );
            border-radius: 2px;
            z-index: 6;
            transition: background 2.5s ease;
        }

        body.storm .pool-edge {
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(198, 24, 26, 0.1) 20%,
                rgba(198, 24, 26, 0.2) 50%,
                rgba(198, 24, 26, 0.1) 80%,
                transparent 100%
            );
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        .title {
            position: absolute;
            top: 48px;
            font-size: 14px;
            letter-spacing: 4px;
            opacity: 0;
            transition: opacity 0.5s ease, color 2.5s ease, text-shadow 2.5s ease, transform 2.5s cubic-bezier(0.23, 1, 0.32, 1);
            color: rgba(255, 255, 255, 0.8);
            transform: scale(1);
            pointer-events: auto;
        }

        .title.visible {
            opacity: 0.9;
        }

        body.storm .title {
            color: #c6181a;
            text-shadow: 0 0 40px rgba(198,24,26,0.8), 0 0 80px rgba(198,24,26,0.4);
            transform: scale(0.5);
        }

        .visualizer-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .circle {
            width: 120px;
            height: 120px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transition: transform 0.08s ease-out, border-color 2.5s ease, box-shadow 2.5s ease, background 2.5s ease, opacity 2.5s ease;
            position: relative;
            background: transparent;
            opacity: 0.6;
        }

        .circle::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transition: background 2.5s ease, box-shadow 2.5s ease;
        }

        body.storm .circle {
            border-color: rgba(198, 24, 26, 0.8);
            background: rgba(198, 24, 26, 0.15);
            opacity: 1;
            box-shadow:
                0 0 80px rgba(198,24,26,0.7),
                0 0 160px rgba(198,24,26,0.4),
                0 0 240px rgba(198,24,26,0.2),
                inset 0 0 60px rgba(198,24,26,0.3);
        }

        body.storm .circle::before {
            background: #c6181a;
            box-shadow: 0 0 40px rgba(198,24,26,1), 0 0 80px rgba(198,24,26,0.8);
        }

        .love-text {
            position: fixed;
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.02);
            pointer-events: none;
            white-space: nowrap;
            transition: color 2.5s ease, text-shadow 2.5s ease, opacity 2.5s ease;
        }

        body.storm .love-text {
            color: rgba(198, 24, 26, 0.6);
            text-shadow: 0 0 20px rgba(198,24,26,0.5);
        }

        .whisper {
            position: absolute;
            font-size: 11px;
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
            white-space: nowrap;
            color: rgba(255, 255, 255, 0.6);
        }

        .whisper.visible {
            opacity: 0.6;
        }

        body.storm .whisper {
            color: #c6181a;
            text-shadow: 0 0 20px rgba(198,24,26,0.7);
        }

        .upload-hint {
            position: absolute;
            bottom: 48px;
            font-size: 11px;
            letter-spacing: 2px;
            opacity: 0.25;
            cursor: pointer;
            transition: opacity 0.3s ease, color 2.5s ease;
            color: rgba(255, 255, 255, 0.6);
            pointer-events: auto;
        }

        .upload-hint:hover {
            opacity: 0.7;
        }

        .upload-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }

        body.storm .upload-hint {
            color: rgba(198, 24, 26, 0.5);
        }

        #audioInput {
            display: none;
        }

        .drag-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .drag-overlay.active {
            display: flex;
        }

        .drag-text {
            font-size: 12px;
            letter-spacing: 4px;
            opacity: 0.5;
            color: rgba(255, 255, 255, 0.7);
        }

        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.04;
            background-image: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)"/></svg>');
        }

        /* Lightning flash effect */
        .lightning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 99;
            transition: opacity 0.1s ease;
        }

        .lightning.flash {
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="world">
        <div class="sky"></div>
        <canvas class="clouds-canvas" id="cloudsCanvas"></canvas>
        <div class="horizon"></div>
        <div class="water-surface"></div>
        <canvas class="water-canvas" id="waterCanvas"></canvas>
        <div class="ground"></div>
        <div class="pool-edge"></div>
        <div class="figures-container">
            <div class="figure figure-left">
                <div class="figure-head"></div>
                <div class="figure-body"></div>
                <div class="figure-legs">
                    <div class="figure-leg"></div>
                    <div class="figure-leg"></div>
                </div>
            </div>
            <div class="platform platform-left"></div>
            <div class="figure figure-right">
                <div class="figure-head"></div>
                <div class="figure-body"></div>
                <div class="figure-legs">
                    <div class="figure-leg"></div>
                    <div class="figure-leg"></div>
                </div>
            </div>
            <div class="platform platform-right"></div>
        </div>
    </div>
    <div class="red-glow"></div>
    <div class="vignette"></div>
    <div class="lightning"></div>
    <div class="grain"></div>

    <div class="container">
        <div class="title">S/HE IS STILL HER/E</div>

        <div class="visualizer-container">
            <div class="circle"></div>
        </div>

        <div class="upload-hint">drop audio or click</div>
    </div>

    <div class="drag-overlay">
        <span class="drag-text">release</span>
    </div>

    <input type="file" id="audioInput" accept="audio/*">
    <audio id="audio" crossorigin="anonymous"></audio>

    <script>
        // ===== PROFOUND CLOUD SYSTEM =====
        // Like Gödel's incompleteness - these clouds suggest depths that cannot be fully rendered
        const canvas = document.getElementById('cloudsCanvas');
        const ctx = canvas.getContext('2d');
        const waterCanvas = document.getElementById('waterCanvas');
        const waterCtx = waterCanvas.getContext('2d');
        const lightning = document.querySelector('.lightning');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight * 0.7;
            waterCanvas.width = window.innerWidth;
            waterCanvas.height = window.innerHeight * 0.35;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Multiple cloud layers for depth and mystery
        const cloudLayers = [];
        const LAYER_COUNT = 4;
        const CLOUDS_PER_LAYER = [4, 6, 8, 10]; // Back to front
        const LAYER_SPEEDS = [0.02, 0.05, 0.1, 0.18]; // Parallax speeds
        const LAYER_OPACITIES = [0.15, 0.25, 0.35, 0.45];
        const LAYER_HEIGHTS = [0.15, 0.3, 0.5, 0.65]; // Vertical distribution
        const LAYER_SCALES = [2.5, 1.8, 1.2, 0.8]; // Larger clouds further back

        class MysteriousCloud {
            constructor(layer) {
                this.layer = layer;
                this.reset(true);
            }

            reset(initial = false) {
                const scale = LAYER_SCALES[this.layer];
                this.width = (200 + Math.random() * 400) * scale;
                this.height = (60 + Math.random() * 100) * scale;
                this.x = initial ? Math.random() * (canvas.width + this.width) - this.width/2 : -this.width - 100;

                // Vertical position based on layer with some variance
                const baseY = canvas.height * LAYER_HEIGHTS[this.layer];
                this.y = baseY + (Math.random() - 0.5) * canvas.height * 0.15;

                this.speed = LAYER_SPEEDS[this.layer] * (0.8 + Math.random() * 0.4);
                this.baseOpacity = LAYER_OPACITIES[this.layer] * (0.7 + Math.random() * 0.3);
                this.opacity = this.baseOpacity;
                this.blur = (25 + Math.random() * 40) * scale;

                // Turbulence properties for mysterious movement
                this.turbulencePhase = Math.random() * Math.PI * 2;
                this.turbulenceSpeed = 0.002 + Math.random() * 0.003;
                this.turbulenceAmplitude = 5 + Math.random() * 15;

                // Pulsing opacity for breathing effect
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.005 + Math.random() * 0.01;

                // Create complex cloud shape with many overlapping forms
                this.parts = [];
                const partCount = 5 + Math.floor(Math.random() * 6);
                for (let i = 0; i < partCount; i++) {
                    const angle = (i / partCount) * Math.PI * 2;
                    const dist = this.width * 0.25 * (0.5 + Math.random() * 0.5);
                    this.parts.push({
                        offsetX: Math.cos(angle) * dist * 0.8,
                        offsetY: Math.sin(angle) * dist * 0.3 + (Math.random() - 0.5) * this.height * 0.3,
                        width: this.width * (0.3 + Math.random() * 0.4),
                        height: this.height * (0.4 + Math.random() * 0.5),
                        phase: Math.random() * Math.PI * 2
                    });
                }

                // Inner darkness - the void within
                this.innerDarkness = [];
                const darkCount = 2 + Math.floor(Math.random() * 3);
                for (let i = 0; i < darkCount; i++) {
                    this.innerDarkness.push({
                        offsetX: (Math.random() - 0.5) * this.width * 0.4,
                        offsetY: (Math.random() - 0.3) * this.height * 0.3,
                        width: this.width * (0.15 + Math.random() * 0.2),
                        height: this.height * (0.2 + Math.random() * 0.25)
                    });
                }
            }

            update(time) {
                this.x += this.speed;

                // Vertical turbulence - clouds drift mysteriously
                this.turbulencePhase += this.turbulenceSpeed;
                const turbulenceY = Math.sin(this.turbulencePhase) * this.turbulenceAmplitude;

                // Pulsing opacity - clouds breathe
                this.pulsePhase += this.pulseSpeed;
                this.opacity = this.baseOpacity * (0.85 + Math.sin(this.pulsePhase) * 0.15);

                this.currentY = this.y + turbulenceY;

                if (this.x > canvas.width + this.width/2 + 100) {
                    this.reset();
                }
            }

            draw(ctx, isStorm) {
                ctx.save();
                ctx.filter = `blur(${this.blur}px)`;
                ctx.globalAlpha = this.opacity;

                // Draw main cloud body
                this.parts.forEach(part => {
                    ctx.beginPath();
                    ctx.ellipse(
                        this.x + part.offsetX,
                        this.currentY + part.offsetY,
                        part.width / 2,
                        part.height / 2,
                        0, 0, Math.PI * 2
                    );
                    // Color shifts based on layer depth
                    const baseColor = isStorm ?
                        `rgba(${80 + this.layer * 20}, ${20 + this.layer * 10}, ${25 + this.layer * 10}, 0.6)` :
                        `rgba(${120 + this.layer * 25}, ${125 + this.layer * 25}, ${140 + this.layer * 20}, 0.5)`;
                    ctx.fillStyle = baseColor;
                    ctx.fill();
                });

                // Draw inner darkness - the mysteries within
                ctx.globalAlpha = this.opacity * 0.4;
                this.innerDarkness.forEach(dark => {
                    ctx.beginPath();
                    ctx.ellipse(
                        this.x + dark.offsetX,
                        this.currentY + dark.offsetY,
                        dark.width / 2,
                        dark.height / 2,
                        0, 0, Math.PI * 2
                    );
                    const darkColor = isStorm ?
                        'rgba(30, 5, 5, 0.7)' :
                        'rgba(40, 40, 60, 0.5)';
                    ctx.fillStyle = darkColor;
                    ctx.fill();
                });

                ctx.restore();
            }
        }

        // Initialize cloud layers
        for (let layer = 0; layer < LAYER_COUNT; layer++) {
            cloudLayers[layer] = [];
            for (let i = 0; i < CLOUDS_PER_LAYER[layer]; i++) {
                cloudLayers[layer].push(new MysteriousCloud(layer));
            }
        }

        // Water ripple system
        const ripples = [];
        class Ripple {
            constructor() {
                this.x = Math.random() * waterCanvas.width;
                this.y = Math.random() * waterCanvas.height * 0.3;
                this.radius = 0;
                this.maxRadius = 20 + Math.random() * 40;
                this.speed = 0.3 + Math.random() * 0.3;
                this.opacity = 0.1 + Math.random() * 0.1;
            }

            update() {
                this.radius += this.speed;
                this.opacity *= 0.995;
                return this.radius < this.maxRadius && this.opacity > 0.01;
            }

            draw(ctx, isStorm) {
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.3, 0, 0, Math.PI * 2);
                ctx.strokeStyle = isStorm ?
                    `rgba(198, 24, 26, ${this.opacity})` :
                    `rgba(255, 255, 255, ${this.opacity})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        let animationTime = 0;
        let isStormMode = false;

        function animateClouds() {
            animationTime++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            isStormMode = document.body.classList.contains('storm');

            // Draw clouds back to front for proper layering
            for (let layer = 0; layer < LAYER_COUNT; layer++) {
                cloudLayers[layer].forEach(cloud => {
                    cloud.update(animationTime);
                    cloud.draw(ctx, isStormMode);
                });
            }

            // Water ripples
            waterCtx.clearRect(0, 0, waterCanvas.width, waterCanvas.height);

            // Spawn new ripples occasionally
            if (Math.random() < 0.02) {
                ripples.push(new Ripple());
            }

            // Update and draw ripples
            for (let i = ripples.length - 1; i >= 0; i--) {
                if (!ripples[i].update()) {
                    ripples.splice(i, 1);
                } else {
                    ripples[i].draw(waterCtx, isStormMode);
                }
            }

            requestAnimationFrame(animateClouds);
        }
        animateClouds();

        // Lightning flash function
        function triggerLightning() {
            lightning.classList.add('flash');
            setTimeout(() => {
                lightning.classList.remove('flash');
                // Double flash effect
                setTimeout(() => {
                    lightning.classList.add('flash');
                    setTimeout(() => lightning.classList.remove('flash'), 80);
                }, 100);
            }, 60);
        }

        // ===== AUDIO VISUALIZER =====
        const whispers = [
            'still here',
            'watching',
            'listening',
            'waiting',
            'remember',
            'always',
            'never',
            'remain',
            'linger',
            'together'
        ];

        const loveFragments = [
            'in the name of love',
            'in the name',
            'of love',
            'the name',
            'love',
            'name',
            'in the',
            'of'
        ];

        let audioContext;
        let analyser;
        let dataArray;
        let audio = document.getElementById('audio');
        let circle = document.querySelector('.circle');
        let title = document.querySelector('.title');
        let uploadHint = document.querySelector('.upload-hint');
        let dragOverlay = document.querySelector('.drag-overlay');
        let audioInput = document.getElementById('audioInput');
        let container = document.querySelector('.container');

        let isPlaying = false;
        let loveTexts = [];

        // ===== BASS DETECTION =====
        let slowBaseline = 0;
        let isInDrop = false;
        let dropStartTime = 0;
        let lastWhisperTime = 0;
        let frameCount = 0;
        let energyHistory = [];
        let buildupDetected = false;

        const BASELINE_RISE_RATE = 0.002;
        const BASELINE_FALL_RATE = 0.02;
        const DROP_THRESHOLD_MULTIPLIER = 2.5;
        const DROP_ABSOLUTE_MIN = 120;
        const EXIT_THRESHOLD_MULTIPLIER = 1.5;
        const MIN_DROP_DURATION = 800;
        const BUILDUP_WINDOW = 90;

        // Scatter "in the name of love" across the page
        function createLoveTexts() {
            const positions = [
                { x: 8, y: 15 },
                { x: 78, y: 10 },
                { x: 88, y: 40 },
                { x: 5, y: 50 },
                { x: 92, y: 65 },
                { x: 10, y: 80 },
                { x: 72, y: 88 },
                { x: 38, y: 95 },
                { x: 55, y: 8 },
                { x: 3, y: 30 },
                { x: 85, y: 85 },
                { x: 22, y: 70 }
            ];

            positions.forEach((pos, i) => {
                const el = document.createElement('div');
                el.className = 'love-text';
                el.textContent = loveFragments[i % loveFragments.length];
                el.style.left = pos.x + '%';
                el.style.top = pos.y + '%';
                el.style.transform = `rotate(${(Math.random() - 0.5) * 25}deg)`;
                document.body.appendChild(el);
                loveTexts.push(el);
            });
        }

        createLoveTexts();

        // Show title on first hover
        let titleShown = false;
        document.addEventListener('mousemove', () => {
            if (!titleShown) {
                title.classList.add('visible');
                titleShown = true;
                setTimeout(() => {
                    title.classList.remove('visible');
                }, 3000);
            }
        });

        // File input handling
        uploadHint.addEventListener('click', () => {
            audioInput.click();
        });

        audioInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                loadAudio(e.target.files[0]);
            }
        });

        // Drag and drop
        document.addEventListener('dragover', (e) => {
            e.preventDefault();
            dragOverlay.classList.add('active');
        });

        document.addEventListener('dragleave', (e) => {
            if (e.relatedTarget === null) {
                dragOverlay.classList.remove('active');
            }
        });

        document.addEventListener('drop', (e) => {
            e.preventDefault();
            dragOverlay.classList.remove('active');

            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('audio/')) {
                loadAudio(file);
            }
        });

        function loadAudio(file) {
            const url = URL.createObjectURL(file);
            audio.src = url;

            if (!audioContext) {
                initAudio();
            }

            // Reset detection state
            slowBaseline = 0;
            energyHistory = [];
            buildupDetected = false;
            isInDrop = false;

            audio.play().then(() => {
                isPlaying = true;
                uploadHint.classList.add('hidden');
                title.classList.add('visible');
            });
        }

        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            analyser.smoothingTimeConstant = 0.4;

            const source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);

            dataArray = new Uint8Array(analyser.frequencyBinCount);

            animateAudio();
        }

        function getSubBass() {
            let sum = 0;
            for (let i = 1; i <= 4; i++) {
                sum += dataArray[i];
            }
            return sum / 4;
        }

        function getBass() {
            let sum = 0;
            for (let i = 5; i <= 12; i++) {
                sum += dataArray[i];
            }
            return sum / 8;
        }

        function getMids() {
            let sum = 0;
            for (let i = 20; i <= 60; i++) {
                sum += dataArray[i];
            }
            return sum / 40;
        }

        function animateAudio() {
            requestAnimationFrame(animateAudio);

            if (!isPlaying || !analyser) return;

            analyser.getByteFrequencyData(dataArray);
            frameCount++;

            const subBass = getSubBass();
            const bass = getBass();
            const mids = getMids();
            const lowEnergy = (subBass * 2 + bass) / 3;

            energyHistory.push(lowEnergy);
            if (energyHistory.length > BUILDUP_WINDOW) {
                energyHistory.shift();
            }

            // Scale circle
            let scale = 1 + (lowEnergy / 255) * 0.7;
            circle.style.transform = `scale(${scale})`;

            // Update baseline asymmetrically
            if (lowEnergy > slowBaseline) {
                slowBaseline += (lowEnergy - slowBaseline) * BASELINE_RISE_RATE;
            } else {
                slowBaseline += (lowEnergy - slowBaseline) * BASELINE_FALL_RATE;
            }
            slowBaseline = Math.max(slowBaseline, 20);

            // Buildup detection
            if (energyHistory.length >= BUILDUP_WINDOW) {
                const firstHalf = energyHistory.slice(0, BUILDUP_WINDOW / 2);
                const secondHalf = energyHistory.slice(BUILDUP_WINDOW / 2);
                const firstAvg = firstHalf.reduce((a, b) => a + b, 0) / firstHalf.length;
                const secondAvg = secondHalf.reduce((a, b) => a + b, 0) / secondHalf.length;
                buildupDetected = secondAvg > firstAvg * 1.3 && secondAvg > 60;
            }

            const now = Date.now();
            const bassRatio = lowEnergy / Math.max(slowBaseline, 1);
            const isTrueBass = lowEnergy > mids * 0.8;

            if (!isInDrop) {
                const ratioTrigger = bassRatio > DROP_THRESHOLD_MULTIPLIER;
                const buildupTrigger = buildupDetected && lowEnergy > 100;
                const absoluteTrigger = lowEnergy > DROP_ABSOLUTE_MIN;

                if ((ratioTrigger || buildupTrigger) && absoluteTrigger && isTrueBass) {
                    enterDrop();
                    dropStartTime = now;
                    buildupDetected = false;
                }
            } else {
                const hasBeenInDropLongEnough = now - dropStartTime > MIN_DROP_DURATION;
                const bassDroppedOff = bassRatio < EXIT_THRESHOLD_MULTIPLIER && lowEnergy < 80;

                if (hasBeenInDropLongEnough && bassDroppedOff) {
                    exitDrop();
                }

                if (now - lastWhisperTime > 600 && Math.random() > 0.6) {
                    spawnWhisper();
                    lastWhisperTime = now;
                }
            }
        }

        function enterDrop() {
            // Like Gödel's incompleteness theorem proving the unprovable,
            // the bass drop reveals what was always there but hidden
            isInDrop = true;

            // Lightning heralds the transformation
            triggerLightning();

            // The fundamental shift - add storm class after brief delay for impact
            setTimeout(() => {
                document.body.classList.add('storm');
                title.classList.add('visible');

                // Spawn intense ripples in the water
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        if (ripples) {
                            const r = new Ripple();
                            r.x = waterCanvas.width / 2 + (Math.random() - 0.5) * 200;
                            r.y = 10;
                            r.maxRadius = 60 + Math.random() * 60;
                            r.opacity = 0.2;
                            ripples.push(r);
                        }
                    }, i * 100);
                }
            }, 150);
        }

        function exitDrop() {
            // The world slowly returns, but something has changed
            isInDrop = false;
            document.body.classList.remove('storm');
        }

        function spawnWhisper() {
            const whisper = document.createElement('div');
            whisper.className = 'whisper';
            whisper.textContent = whispers[Math.floor(Math.random() * whispers.length)];

            const angle = Math.random() * Math.PI * 2;
            const distance = 100 + Math.random() * 100;
            const x = Math.cos(angle) * distance;
            const y = Math.sin(angle) * distance;

            whisper.style.left = `calc(50% + ${x}px)`;
            whisper.style.top = `calc(50% + ${y}px)`;
            whisper.style.transform = `translate(-50%, -50%) rotate(${(Math.random() - 0.5) * 15}deg)`;

            container.appendChild(whisper);

            setTimeout(() => whisper.classList.add('visible'), 50);

            setTimeout(() => {
                whisper.classList.remove('visible');
                setTimeout(() => whisper.remove(), 800);
            }, 2000 + Math.random() * 1000);
        }

        audio.addEventListener('ended', () => {
            isPlaying = false;
            title.classList.remove('visible');
            uploadHint.classList.remove('hidden');
            exitDrop();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && audio.src) {
                e.preventDefault();
                if (audio.paused) {
                    audio.play();
                    isPlaying = true;
                } else {
                    audio.pause();
                    isPlaying = false;
                }
            }
        });

        document.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
