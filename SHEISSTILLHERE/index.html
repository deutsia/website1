<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S/HE IS STILL HER/E</title>
    <link rel="icon" type="image/webp" href="../assets/favi.webp">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background: #030305;
            color: rgba(255, 255, 255, 0.7);
        }

        /* THE WORLD - everything that zooms */
        .world {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scale(1);
            transform-origin: 50% 70%;
            transition: transform 2.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.storm .world {
            transform: scale(2.5);
        }

        /* Background image */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../assets/before.jpg');
            background-size: cover;
            background-position: center;
            z-index: 0;
            transition: filter 2.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.storm .background {
            filter: sepia(1) hue-rotate(-30deg) saturate(3) brightness(0.4);
        }

        .red-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse 150% 100% at 50% 60%,
                rgba(139, 0, 0, 0.7) 0%,
                rgba(100, 0, 0, 0.5) 30%,
                rgba(60, 0, 0, 0.3) 60%,
                transparent 80%
            );
            opacity: 0;
            pointer-events: none;
            z-index: 2;
            transition: opacity 2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.storm .red-glow {
            opacity: 1;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 3;
            transition: background 2.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.storm .vignette {
            background: radial-gradient(ellipse at 50% 70%, transparent 5%, rgba(0,0,0,0.95) 50%);
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        .title {
            position: absolute;
            top: 48px;
            font-size: 14px;
            letter-spacing: 4px;
            opacity: 0;
            transition: opacity 0.5s ease, color 2.5s ease, text-shadow 2.5s ease, transform 2.5s cubic-bezier(0.23, 1, 0.32, 1);
            color: rgba(255, 255, 255, 0.8);
            transform: scale(1);
            pointer-events: auto;
        }

        .title.visible {
            opacity: 0.9;
        }

        body.storm .title {
            color: #c6181a;
            text-shadow: 0 0 40px rgba(198,24,26,0.8), 0 0 80px rgba(198,24,26,0.4);
            transform: scale(0.45);
        }

        .visualizer-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .circle {
            width: 120px;
            height: 120px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transition: transform 0.08s ease-out, border-color 2.5s ease, box-shadow 2.5s ease, background 2.5s ease, opacity 2.5s ease;
            position: relative;
            background: transparent;
            opacity: 0.5;
        }

        .circle::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transition: background 2.5s ease, box-shadow 2.5s ease;
        }

        body.storm .circle {
            border-color: rgba(198, 24, 26, 0.8);
            background: rgba(198, 24, 26, 0.15);
            opacity: 1;
            box-shadow:
                0 0 80px rgba(198,24,26,0.7),
                0 0 160px rgba(198,24,26,0.4),
                0 0 240px rgba(198,24,26,0.2),
                inset 0 0 60px rgba(198,24,26,0.3);
        }

        body.storm .circle::before {
            background: #c6181a;
            box-shadow: 0 0 40px rgba(198,24,26,1), 0 0 80px rgba(198,24,26,0.8);
        }

        .whisper {
            position: absolute;
            font-size: 11px;
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
            white-space: nowrap;
            color: rgba(255, 255, 255, 0.6);
        }

        .whisper.visible {
            opacity: 0.6;
        }

        body.storm .whisper {
            color: #c6181a;
            text-shadow: 0 0 20px rgba(198,24,26,0.7);
        }

        .upload-hint {
            position: absolute;
            bottom: 48px;
            font-size: 11px;
            letter-spacing: 2px;
            opacity: 0.25;
            cursor: pointer;
            transition: opacity 0.3s ease, color 2.5s ease;
            color: rgba(255, 255, 255, 0.6);
            pointer-events: auto;
        }

        .upload-hint:hover {
            opacity: 0.7;
        }

        .upload-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }

        body.storm .upload-hint {
            color: rgba(198, 24, 26, 0.5);
        }

        #audioInput {
            display: none;
        }

        .drag-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .drag-overlay.active {
            display: flex;
        }

        .drag-text {
            font-size: 12px;
            letter-spacing: 4px;
            opacity: 0.5;
            color: rgba(255, 255, 255, 0.7);
        }

        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.04;
            background-image: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)"/></svg>');
        }

        /* Lightning flash effect */
        .lightning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 99;
            transition: opacity 0.05s ease;
        }

        .lightning.flash {
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="world">
        <div class="background"></div>
    </div>
    <div class="red-glow"></div>
    <div class="vignette"></div>
    <div class="lightning"></div>
    <div class="grain"></div>

    <div class="container">
        <div class="title">S/HE IS STILL HER/E</div>

        <div class="visualizer-container">
            <div class="circle"></div>
        </div>

        <div class="upload-hint">drop audio or click</div>
    </div>

    <div class="drag-overlay">
        <span class="drag-text">release</span>
    </div>

    <input type="file" id="audioInput" accept="audio/*">
    <audio id="audio" crossorigin="anonymous"></audio>

    <script>
        const lightning = document.querySelector('.lightning');

        function triggerLightning() {
            lightning.classList.add('flash');
            setTimeout(() => {
                lightning.classList.remove('flash');
                setTimeout(() => {
                    lightning.classList.add('flash');
                    setTimeout(() => lightning.classList.remove('flash'), 60);
                }, 80);
            }, 50);
        }

        // ===== AUDIO VISUALIZER =====
        const whispers = [
            'still here',
            'watching',
            'listening',
            'waiting',
            'remember',
            'always',
            'never',
            'remain',
            'linger',
            'together'
        ];

        let audioContext;
        let analyser;
        let dataArray;
        let audio = document.getElementById('audio');
        let circle = document.querySelector('.circle');
        let title = document.querySelector('.title');
        let uploadHint = document.querySelector('.upload-hint');
        let dragOverlay = document.querySelector('.drag-overlay');
        let audioInput = document.getElementById('audioInput');
        let container = document.querySelector('.container');

        let isPlaying = false;

        // ===== BASS DETECTION =====
        let slowBaseline = 0;
        let isInDrop = false;
        let dropStartTime = 0;
        let lastWhisperTime = 0;
        let frameCount = 0;
        let energyHistory = [];
        let buildupDetected = false;

        const BASELINE_RISE_RATE = 0.002;
        const BASELINE_FALL_RATE = 0.02;
        const DROP_THRESHOLD_MULTIPLIER = 2.5;
        const DROP_ABSOLUTE_MIN = 120;
        const EXIT_THRESHOLD_MULTIPLIER = 1.5;
        const MIN_DROP_DURATION = 800;
        const BUILDUP_WINDOW = 90;

        // Show title on first hover
        let titleShown = false;
        document.addEventListener('mousemove', () => {
            if (!titleShown) {
                title.classList.add('visible');
                titleShown = true;
                setTimeout(() => {
                    title.classList.remove('visible');
                }, 3000);
            }
        });

        // File input handling
        uploadHint.addEventListener('click', () => {
            audioInput.click();
        });

        audioInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                loadAudio(e.target.files[0]);
            }
        });

        // Drag and drop
        document.addEventListener('dragover', (e) => {
            e.preventDefault();
            dragOverlay.classList.add('active');
        });

        document.addEventListener('dragleave', (e) => {
            if (e.relatedTarget === null) {
                dragOverlay.classList.remove('active');
            }
        });

        document.addEventListener('drop', (e) => {
            e.preventDefault();
            dragOverlay.classList.remove('active');

            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('audio/')) {
                loadAudio(file);
            }
        });

        function loadAudio(file) {
            const url = URL.createObjectURL(file);
            audio.src = url;

            if (!audioContext) {
                initAudio();
            }

            // Reset detection state
            slowBaseline = 0;
            energyHistory = [];
            buildupDetected = false;
            isInDrop = false;

            audio.play().then(() => {
                isPlaying = true;
                uploadHint.classList.add('hidden');
                title.classList.add('visible');
            });
        }

        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            analyser.smoothingTimeConstant = 0.4;

            const source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);

            dataArray = new Uint8Array(analyser.frequencyBinCount);

            animateAudio();
        }

        function getSubBass() {
            let sum = 0;
            for (let i = 1; i <= 4; i++) {
                sum += dataArray[i];
            }
            return sum / 4;
        }

        function getBass() {
            let sum = 0;
            for (let i = 5; i <= 12; i++) {
                sum += dataArray[i];
            }
            return sum / 8;
        }

        function getMids() {
            let sum = 0;
            for (let i = 20; i <= 60; i++) {
                sum += dataArray[i];
            }
            return sum / 40;
        }

        function animateAudio() {
            requestAnimationFrame(animateAudio);

            if (!isPlaying || !analyser) return;

            analyser.getByteFrequencyData(dataArray);
            frameCount++;

            const subBass = getSubBass();
            const bass = getBass();
            const mids = getMids();
            const lowEnergy = (subBass * 2 + bass) / 3;

            energyHistory.push(lowEnergy);
            if (energyHistory.length > BUILDUP_WINDOW) {
                energyHistory.shift();
            }

            // Scale circle
            let scale = 1 + (lowEnergy / 255) * 0.7;
            circle.style.transform = `scale(${scale})`;

            // Update baseline asymmetrically
            if (lowEnergy > slowBaseline) {
                slowBaseline += (lowEnergy - slowBaseline) * BASELINE_RISE_RATE;
            } else {
                slowBaseline += (lowEnergy - slowBaseline) * BASELINE_FALL_RATE;
            }
            slowBaseline = Math.max(slowBaseline, 20);

            // Buildup detection
            if (energyHistory.length >= BUILDUP_WINDOW) {
                const firstHalf = energyHistory.slice(0, BUILDUP_WINDOW / 2);
                const secondHalf = energyHistory.slice(BUILDUP_WINDOW / 2);
                const firstAvg = firstHalf.reduce((a, b) => a + b, 0) / firstHalf.length;
                const secondAvg = secondHalf.reduce((a, b) => a + b, 0) / secondHalf.length;
                buildupDetected = secondAvg > firstAvg * 1.3 && secondAvg > 60;
            }

            const now = Date.now();
            const bassRatio = lowEnergy / Math.max(slowBaseline, 1);
            const isTrueBass = lowEnergy > mids * 0.8;

            if (!isInDrop) {
                const ratioTrigger = bassRatio > DROP_THRESHOLD_MULTIPLIER;
                const buildupTrigger = buildupDetected && lowEnergy > 100;
                const absoluteTrigger = lowEnergy > DROP_ABSOLUTE_MIN;

                if ((ratioTrigger || buildupTrigger) && absoluteTrigger && isTrueBass) {
                    enterDrop();
                    dropStartTime = now;
                    buildupDetected = false;
                }
            } else {
                const hasBeenInDropLongEnough = now - dropStartTime > MIN_DROP_DURATION;
                const bassDroppedOff = bassRatio < EXIT_THRESHOLD_MULTIPLIER && lowEnergy < 80;

                if (hasBeenInDropLongEnough && bassDroppedOff) {
                    exitDrop();
                }

                if (now - lastWhisperTime > 600 && Math.random() > 0.6) {
                    spawnWhisper();
                    lastWhisperTime = now;
                }
            }
        }

        function enterDrop() {
            isInDrop = true;
            triggerLightning();

            setTimeout(() => {
                document.body.classList.add('storm');
                title.classList.add('visible');
            }, 100);
        }

        function exitDrop() {
            isInDrop = false;
            document.body.classList.remove('storm');
        }

        function spawnWhisper() {
            const whisper = document.createElement('div');
            whisper.className = 'whisper';
            whisper.textContent = whispers[Math.floor(Math.random() * whispers.length)];

            const angle = Math.random() * Math.PI * 2;
            const distance = 100 + Math.random() * 100;
            const x = Math.cos(angle) * distance;
            const y = Math.sin(angle) * distance;

            whisper.style.left = `calc(50% + ${x}px)`;
            whisper.style.top = `calc(50% + ${y}px)`;
            whisper.style.transform = `translate(-50%, -50%) rotate(${(Math.random() - 0.5) * 15}deg)`;

            container.appendChild(whisper);

            setTimeout(() => whisper.classList.add('visible'), 50);

            setTimeout(() => {
                whisper.classList.remove('visible');
                setTimeout(() => whisper.remove(), 800);
            }, 2000 + Math.random() * 1000);
        }

        audio.addEventListener('ended', () => {
            isPlaying = false;
            title.classList.remove('visible');
            uploadHint.classList.remove('hidden');
            exitDrop();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && audio.src) {
                e.preventDefault();
                if (audio.paused) {
                    audio.play();
                    isPlaying = true;
                } else {
                    audio.pause();
                    isPlaying = false;
                }
            }
        });

        document.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
